---
name: 功能请求
about: 建议一个新功能
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请填写以下信息。

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能想解决什么问题？
      placeholder: "例如：当前无法导出为 Word 格式..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何解决这个问题？
      placeholder: "例如：增加 `--export docx` 参数..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 其他上下文信息
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有 Issue，确认没有重复建议
          required: true
