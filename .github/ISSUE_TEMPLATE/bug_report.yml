---
name: Bug 报告
about: 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请填写以下信息，帮助我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的 KB Query Engine 版本号
      placeholder: "例如：v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述你遇到的问题
      placeholder: "例如：运行 `python kb_query.py --answer` 时报错..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 一步步说明如何复现这个 Bug
      placeholder: |
        1. 运行命令 `...`
        2. 输入查询 `...`
        3. 观察到错误 `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么（附带错误信息）
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴相关错误日志（如果有）
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有 Issue，确认没有重复报告
          required: true
        - label: 我已阅读文档，确认不是使用问题
          required: true
